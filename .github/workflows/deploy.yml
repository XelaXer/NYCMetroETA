name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: docker.nyc.xelaxer.com
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./metro_api
          push: true
          platforms: linux/amd64
          tags: |
            docker.nyc.xelaxer.com/nyc_metro_eta:${{ github.sha }}
            docker.nyc.xelaxer.com/nyc_metro_eta:latest

  deploy:
    needs: build
    runs-on: [self-hosted, k3s-nyc, fort]
    steps:
      - name: Deploy
        run: |
          kubectl set image deployment/nyc-metro-eta \
            app=docker.nyc.xelaxer.com/nyc_metro_eta:${{ github.sha }} \
            -n fort

      - name: Wait for rollout
        run: kubectl rollout status deployment/nyc-metro-eta -n fort --timeout=3m

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/nyc-metro-eta -n fort
